name: Build Libbox XCFramework for iOS

on:
  workflow_dispatch:          # 手动触发
    inputs:
      singbox_version:
        description: 'sing-box 版本 (tag 或 branch，例如 v1.14.0-alpha.6)'
        required: true
        default: 'v1.14.0-alpha.6'
  push:
    branches: [ main ]
    paths:
      - '.github/workflows/build-libbox.yml'

jobs:
  build:
    runs-on: macos-15          # macOS Runner（必须有 Xcode）
    permissions:
      contents: write

    steps:
      - name: Checkout this repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '^1.23'     # sing-box 目前推荐 Go 1.23+
          cache: true

      - name: Install gomobile
        run: |
          go install golang.org/x/mobile/cmd/gomobile@latest
          gomobile init

      - name: Checkout sing-box
        uses: actions/checkout@v4
        with:
          repository: SagerNet/sing-box
          ref: ${{ inputs.singbox_version || 'v1.14.0-alpha.6' }}
          path: sing-box
          fetch-depth: 0

      - name: Build Libbox XCFramework
        working-directory: sing-box/experimental/libbox
        run: |
          echo "Building Libbox for sing-box version: ${{ inputs.singbox_version || 'v1.14.0-alpha.6' }}"
          
          gomobile bind \
            -target=ios,iossimulator \
            -ldflags="-s -w" \
            -o ../../Libbox.xcframework \
            .

      - name: Verify XCFramework
        run: |
          ls -la Libbox.xcframework
          echo "XCFramework built successfully!"

      - name: Package XCFramework
        run: |
          zip -r Libbox.xcframework.zip Libbox.xcframework

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Libbox.xcframework
          path: Libbox.xcframework.zip
          retention-days: 30

      - name: Create Release and Upload
        if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: libbox-${{ inputs.singbox_version || 'latest' }}
          name: Libbox XCFramework for sing-box ${{ inputs.singbox_version || 'v1.14.0-alpha.6' }}
          files: Libbox.xcframework.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
